    }

    // Применение прогресса из БД
    function applyProgress(data) {
        if (!data) return;

        if (nodesData) {
            nodesData.get().forEach(node => {
                if (node.tasks && data[node.id]) {
                    const updatedTasks = node.tasks.map((task, index) => {
                        const savedVal = data[node.id][index];
                        let newStatus = 'none';
                        
                        if (typeof savedVal === 'boolean') {
                            newStatus = savedVal ? 'completed' : 'none';
                        } else if (typeof savedVal === 'string') {
                            newStatus = savedVal;
                        }

                        return {
                            ...task,
                            status: newStatus,
                            completed: newStatus === 'completed'
                        };
                    });
                    nodesData.update({ id: node.id, tasks: updatedTasks });
                }
            });
            calculateTreeStatus();
            if (selectedNodeId) updateSidePanel(nodesData.get(selectedNodeId));
        }
    }

    // Сохранение прогресса в БД
    async function saveToFirebase() {
        if (!db) return;
        const progress = {};
        nodesData.get().forEach(node => {
            if (node.tasks) progress[node.id] = node.tasks.map(t => t.status || 'none');
        });
        try {
            await setDoc(doc(db, "students", studentId), { progress }, { merge: true });
        } catch (error) {
            console.error("Ошибка сохранения Firebase:", error);
        }
    }

    function initGraph() {
        const container = document.getElementById('network-container');
        const data = { nodes: nodesData, edges: edgesData };

        const options = {
            nodes: {
                shape: 'box', margin: { top: 12, bottom: 12, left: 16, right: 16 }, 
                shapeProperties: { borderRadius: 6 }, borderWidth: 2, font: { face: 'Segoe UI', size: 14 }
            },
            edges: { width: 2, color: { color: '#444444', highlight: '#ffffff' }, smooth: false },
            groups: {
                completed: { color: { background: '#1a3320', border: '#4CAF50', highlight: { background: '#254a2e', border: '#66bb6a' } }, font: { color: '#ffffff' }, shadow: { enabled: true, color: 'rgba(76, 175, 80, 0.4)', size: 15, x: 0, y: 0 } },
                in_progress: { color: { background: '#332a00', border: '#FFC107', highlight: { background: '#4d4000', border: '#ffca28' } }, font: { color: '#ffffff' }, shadow: { enabled: true, color: 'rgba(255, 193, 7, 0.15)', size: 10, x: 0, y: 0 } },
                lost: { color: { background: '#3d1616', border: '#EF4444', highlight: { background: '#4d1c1c', border: '#f87171' } }, font: { color: '#ffffff' }, shadow: { enabled: true, color: 'rgba(239, 68, 68, 0.4)', size: 15, x: 0, y: 0 } },
                locked: { color: { background: '#1e1e1e', border: '#333333', highlight: { background: '#2a2a2a', border: '#555555' } }, font: { color: '#777777' }, shadow: false }
            },
            physics: { forceAtlas2Based: { gravitationalConstant: -220, centralGravity: 0.005, springLength: 150, springConstant: 0.12 }, solver: 'forceAtlas2Based', stabilization: { iterations: 150 } }
        };

        network = new vis.Network(container, data, options);
        calculateTreeStatus();

        network.on("click", function (params) {
            if (params.nodes.length > 0) {
                selectedNodeId = params.nodes[0];
                const nodeData = nodesData.get(selectedNodeId);
                // Проверяем наличие задач, не открываем панель для ветвей
                if (nodeData.tasks || nodeData.group === 'lost' || nodeData.group === 'completed') {
                    updateSidePanel(nodeData);
                    document.getElementById('side-panel').classList.add('open');
                } else {
                    window.closePanel();
                }
            } else {
                window.closePanel();
            }
        });
    }

    // Расчет статуса родительских узлов на основе задач
    function calculateTreeStatus() {
        const allEdges = edgesData.get();
        const parentMap = {};
        allEdges.forEach(e => {
            if (!parentMap[e.from]) parentMap[e.from] = [];
            parentMap[e.from].push(e.to);
        });

        // Рекурсивный обход
        function evalNode(nodeId) {
            const children = parentMap[nodeId];
            const node = nodesData.get(nodeId);
            
            // Листовой узел (тема)
            if (!children || children.length === 0) {
                if (node.tasks) {
                    const total = node.tasks.length;
                    const lostCount = node.tasks.filter(t => t.status === 'lost').length;
                    const completedCount = node.tasks.filter(t => t.status === 'completed').length;
                    
                    let newGroup = 'locked';
                    if (lostCount > 0) newGroup = 'lost';
                    else if (completedCount === total && total > 0) newGroup = 'completed';
                    else if (completedCount > 0) newGroup = 'in_progress';
                    
                    if (node.group !== newGroup) nodesData.update({ id: nodeId, group: newGroup });
                }
                return;
            }

            // Узел ветви
            children.forEach(childId => evalNode(childId)); 

            let allCompleted = true; 
            let allLocked = true;
            let anyLost = false;

            children.forEach(childId => {
                const childNode = nodesData.get(childId);
                if (childNode.group === 'lost') anyLost = true;
                if (childNode.group !== 'completed') allCompleted = false;
                if (childNode.group !== 'locked') allLocked = false;
            });

            let newGroup = 'locked';
            if (anyLost) newGroup = 'lost';
            else if (allCompleted) newGroup = 'completed';
            else if (!allLocked) newGroup = 'in_progress';

            if (node.group !== newGroup) nodesData.update({ id: nodeId, group: newGroup });
        }
        
        evalNode('ege_physics'); 
    }

    // Переключение статуса задачи (Админ)
    window.handleTaskToggle = function(nodeId, taskIndex) {
        if (!isAdmin) return;
        const node = nodesData.get(nodeId);
        if (!node || !node.tasks) return;

        const task = node.tasks[taskIndex];
        const states = ['none', 'completed', 'lost'];
        const currentIndex = states.indexOf(task.status || 'none');
        const nextState = states[(currentIndex + 1) % states.length];

        const updatedTasks = node.tasks.map((t, idx) => {
            if (idx === taskIndex) {
                return { ...t, status: nextState, completed: nextState === 'completed' };
            }
            return t;
        });

        nodesData.update({ id: nodeId, tasks: updatedTasks });
        
        calculateTreeStatus();
        updateSidePanel(nodesData.get(nodeId));
        saveToFirebase();
    };

    // Обновление боковой панели
    function updateSidePanel(nodeData) {
        const spTitle = document.getElementById('sp-title');
        const spStatus = document.getElementById('sp-status');
        const spDesc = document.getElementById('sp-desc');

        spTitle.innerText = nodeData.label;
        spStatus.className = 'panel-status';
        
        if (nodeData.group === 'completed') {
            spStatus.innerText = 'Статус: Изучено'; spStatus.classList.add('status-completed');
        } else if (nodeData.group === 'lost') {
            spStatus.innerText = 'Статус: Проблемная тема'; spStatus.classList.add('status-lost');
        } else if (nodeData.group === 'in_progress') {
            spStatus.innerText = 'Статус: В процессе'; spStatus.classList.add('status-in_progress');
        } else {
            spStatus.innerText = 'Статус: Не изучалось'; spStatus.classList.add('status-locked');
        }
        
        let descHtml = "";
        if (nodeData.tasks) {
            descHtml += '<ul class="task-list">';
            nodeData.tasks.forEach((task, index) => {
                const status = task.status || 'none';
                const interactiveClass = isAdmin ? 'interactive' : '';
                
                let icon = '';
                if (status === 'completed') icon = '✓';
                else if (status === 'lost') icon = '✕';

                descHtml += `
                    <li class="task-item">
                        <div class="task-label ${interactiveClass}" onclick="${interactiveClass ? `window.handleTaskToggle('${nodeData.id}', ${index})` : ''}">
                            <div class="task-status-btn state-${status}">${icon}</div>
                            <span class="task-text text-${status}">${task.text}</span>
                        </div>
                    </li>
                `;
            });
            descHtml += '</ul>';
        } else {
            descHtml = "Родительский раздел. Статус вычисляется на основе дочерних тем.";
        }
        
        spDesc.innerHTML = descHtml;
        // Рендер MathJax после обновления HTML
        MathJax.typesetPromise([spDesc]).catch(err => console.error("MathJax Error:", err));
    }

    window.closePanel = function() {
        document.getElementById('side-panel').classList.remove('open');
        selectedNodeId = null;
    }

    initFirebase();
</script>
