            right: 15px;

        .status-completed { color: #81c784; }
        .status-in_progress { color: #ffd54f; }
        .status-locked { color: #888888; }
        .status-lost { color: #EF4444; }

            padding: 0;
            margin-top: 15px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        .task-item { margin-bottom: 16px; }
        
        .task-label {
            display: flex;
            align-items: flex-start;
            font-size: 0.95em;
            position: relative;
            cursor: default;
        }
        .task-label.interactive { cursor: pointer; }
        
        .task-status-btn {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            border: 2px solid #444;
            border-radius: 4px;
            margin-right: 12px;
            margin-top: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s ease;
            background-color: #2a2a2a;
            user-select: none;
        }
        .task-label.interactive:hover .task-status-btn.state-none { border-color: #888; }
        
        .task-status-btn.state-completed {
            background-color: #4CAF50;
            border-color: #4CAF50;
            color: white;
        }
        .task-status-btn.state-lost {
            background-color: #EF4444;
            border-color: #EF4444;
            color: white;
        }
        
        .task-text {
            line-height: 1.5;
            display: inline;
            word-break: break-word;
            transition: color 0.2s;
        }
        .text-completed { color: #81c784; font-weight: 500; }
        .text-pending { color: #888888; }
        .text-lost { color: #EF4444; font-weight: 500; }
        
        mjx-container[jax="SVG"] { color: inherit !important; }

        #admin-panel {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;

            display: flex;

        document.getElementById('admin-panel').style.display = 'block';

    let nodesData = new vis.DataSet(SYLLABUS_DATA.nodes);
    let edgesData = new vis.DataSet(SYLLABUS_DATA.edges);

    let selectedNodeId = null;

        if (!firebaseConfig || Object.keys(firebaseConfig).length === 0) {
            overlay.style.display = 'none';
            initGraph();
            return;
        }

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            db = getFirestore(app);

            await signInAnonymously(auth);
            
            const docRef = doc(db, "students", studentId);
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data().progress;
                    applyProgress(data);
                }
                
                if (!network) {
                    initGraph();
                }
                overlay.style.display = 'none';
            }, (error) => {
                console.error("Ошибка чтения:", error);
                overlay.innerHTML = "Ошибка доступа к Firebase. Проверьте Security Rules.";
            });
            
        } catch (error) {
            console.error(error);
            overlay.innerHTML = "Ошибка инициализации Firebase.";
        }
    }

    function applyProgress(data) {
        if (!data) return;

        if (nodesData) {
            nodesData.get().forEach(node => {
                if (node.tasks && data[node.id]) {
                    const updatedTasks = node.tasks.map((task, index) => {
                        const savedVal = data[node.id][index];
                        let newStatus = 'none';
                        
                        // Поддержка старого булевого формата и нового строкового
                        if (typeof savedVal === 'boolean') {
                            newStatus = savedVal ? 'completed' : 'none';
                        } else if (typeof savedVal === 'string') {
                            newStatus = savedVal;
                        }

                        return {
                            ...task,
                            status: newStatus,
                            completed: newStatus === 'completed'
                        };
                    });
                    nodesData.update({ id: node.id, tasks: updatedTasks });
                }
            });
            calculateTreeStatus();
            if (selectedNodeId) updateSidePanel(nodesData.get(selectedNodeId));
        }
    }

    async function saveToFirebase() {
        if (!db) return;
        const progress = {};
        nodesData.get().forEach(node => {
            if (node.tasks) progress[node.id] = node.tasks.map(t => t.status || 'none');
        });
        try {
            await setDoc(doc(db, "students", studentId), { progress }, { merge: true });
        } catch (error) {
            console.error("Ошибка записи:", error);
        }
    }

    function initGraph() {
        const container = document.getElementById('network-container');
        const data = { nodes: nodesData, edges: edgesData };

        const options = {
            nodes: {
                shape: 'box', margin: { top: 12, bottom: 12, left: 16, right: 16 }, 
                shapeProperties: { borderRadius: 6 }, borderWidth: 2, font: { face: 'Segoe UI', size: 14 }
            },
            edges: { width: 2, color: { color: '#444444', highlight: '#ffffff' }, smooth: false },
            groups: {
                completed: { color: { background: '#1a3320', border: '#4CAF50', highlight: { background: '#254a2e', border: '#66bb6a' } }, font: { color: '#ffffff' }, shapeProperties: { borderDashes: false }, shadow: { enabled: true, color: 'rgba(76, 175, 80, 0.4)', size: 15, x: 0, y: 0 } },
                in_progress: { color: { background: '#332a00', border: '#FFC107', highlight: { background: '#4d4000', border: '#ffca28' } }, font: { color: '#ffffff' }, shapeProperties: { borderDashes: [5, 5] }, shadow: { enabled: true, color: 'rgba(255, 193, 7, 0.15)', size: 10, x: 0, y: 0 } },
                lost: { color: { background: '#3d1616', border: '#EF4444', highlight: { background: '#4d1c1c', border: '#f87171' } }, font: { color: '#ffffff' }, shapeProperties: { borderDashes: false }, shadow: { enabled: true, color: 'rgba(239, 68, 68, 0.4)', size: 15, x: 0, y: 0 } },
                locked: { color: { background: '#1e1e1e', border: '#333333', highlight: { background: '#2a2a2a', border: '#555555' } }, font: { color: '#777777' }, shapeProperties: { borderDashes: false }, shadow: false }
            },
            physics: { forceAtlas2Based: { gravitationalConstant: -220, centralGravity: 0.005, springLength: 150, springConstant: 0.12 }, maxVelocity: 50, solver: 'forceAtlas2Based', timestep: 0.35, stabilization: { iterations: 150 } }
        };

        network = new vis.Network(container, data, options);
        calculateTreeStatus();

        network.on("click", function (params) {
            if (params.nodes.length > 0) {
                selectedNodeId = params.nodes[0];
                updateSidePanel(nodesData.get(selectedNodeId));
                document.getElementById('side-panel').classList.add('open');
            } else {
                window.closePanel();
            }
        });
    }

    function calculateTreeStatus() {
        const allEdges = edgesData.get();
        const parentMap = {};
        allEdges.forEach(e => {
            if (!parentMap[e.from]) parentMap[e.from] = [];
            parentMap[e.from].push(e.to);
        });

        function evalNode(nodeId) {
            const children = parentMap[nodeId];
            const node = nodesData.get(nodeId);
            
            // Если это лист (нет детей) - считаем статус по задачам
            if (!children || children.length === 0) {
                if (node.tasks) {
                    const total = node.tasks.length;
                    const lostCount = node.tasks.filter(t => t.status === 'lost').length;
                    const completedCount = node.tasks.filter(t => t.status === 'completed').length;
                    
                    let newGroup = 'locked';
                    if (lostCount > 0) newGroup = 'lost';
                    else if (completedCount === total && total > 0) newGroup = 'completed';
                    else if (completedCount > 0) newGroup = 'in_progress';
                    
                    if (node.group !== newGroup) nodesData.update({ id: nodeId, group: newGroup });
                }
                return;
            }

            // Если это родительский узел - считаем статус по детям
            let allCompleted = true; 
            let allLocked = true;
            let anyLost = false;

            children.forEach(childId => {
                evalNode(childId); 
                const childNode = nodesData.get(childId);
                if (childNode.group === 'lost') anyLost = true;
                if (childNode.group !== 'completed') allCompleted = false;
                if (childNode.group !== 'locked') allLocked = false;
            });

            let newGroup = 'locked';
            if (anyLost) newGroup = 'lost';
            else if (allCompleted) newGroup = 'completed';
            else if (!allLocked) newGroup = 'in_progress';

            if (node.group !== newGroup) nodesData.update({ id: nodeId, group: newGroup });
        }
        
        evalNode('physics'); 
    }

    window.handleTaskToggle = function(nodeId, taskIndex) {
        if (!isAdmin) return;
        const node = nodesData.get(nodeId);
        if (!node || !node.tasks) return;

        const task = node.tasks[taskIndex];
        const states = ['none', 'completed', 'lost'];
        const currentIndex = states.indexOf(task.status || 'none');
        const nextState = states[(currentIndex + 1) % states.length];

        const updatedTasks = node.tasks.map((t, idx) => {
            if (idx === taskIndex) {
                return { ...t, status: nextState, completed: nextState === 'completed' };
            }
            return t;
        });

        nodesData.update({ id: nodeId, tasks: updatedTasks });
        
        calculateTreeStatus();
        updateSidePanel(nodesData.get(nodeId));
        saveToFirebase();
    };

    function updateSidePanel(nodeData) {
        const spTitle = document.getElementById('sp-title');
        const spStatus = document.getElementById('sp-status');
        const spDesc = document.getElementById('sp-desc');

        spTitle.innerText = nodeData.label;
        spStatus.className = 'panel-status';
        
        if (nodeData.group === 'completed') {
            spStatus.innerText = 'Статус: Изучено'; spStatus.classList.add('status-completed');
        } else if (nodeData.group === 'lost') {
            spStatus.innerText = 'Статус: Требует повторения'; spStatus.classList.add('status-lost');
        } else if (nodeData.group === 'in_progress') {
            spStatus.innerText = 'Статус: В процессе'; spStatus.classList.add('status-in_progress');
        } else {
            spStatus.innerText = 'Статус: Заблокировано'; spStatus.classList.add('status-locked');
        }
        
        let descHtml = "";
        if (nodeData.tasks && nodeData.tasks.length > 0) {
            descHtml += '<ul class="task-list">';
            nodeData.tasks.forEach((task, index) => {
                const status = task.status || 'none';
                const interactiveClass = isAdmin ? 'interactive' : '';
                
                let icon = '';
                if (status === 'completed') icon = '✓';
                else if (status === 'lost') icon = '✕';

                descHtml += `
                    <li class="task-item">
                        <div class="task-label ${interactiveClass}" onclick="${interactiveClass ? `window.handleTaskToggle('${nodeData.id}', ${index})` : ''}">
                            <div class="task-status-btn state-${status}">${icon}</div>
                            <span class="task-text text-${status}">${task.text}</span>
                        </div>
                    </li>
                `;
            });
            descHtml += '</ul>';
        } else {
            descHtml = "Сборный узел. Статус зависит от дочерних тем.";
        }
        
        spDesc.innerHTML = descHtml;
        if (window.MathJax) MathJax.typesetPromise([spDesc]).catch(err => console.error(err));
    }

    window.closePanel = function() {
        document.getElementById('side-panel').classList.remove('open');
        selectedNodeId = null;
    }

    initFirebase();
</script>
