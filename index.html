    };

    // Обновленная логика цикла состояний: none -> completed -> lost -> none
    window.handleTaskToggle = function(nodeId, taskIndex) {
        if (!isAdmin) return;
        const node = nodesData.get(nodeId);
        const task = node.tasks[taskIndex];

        let nextStatus;
        if (!task.completed && task.status !== 'lost') nextStatus = 'completed';
        else if (task.completed) nextStatus = 'lost';
        else nextStatus = 'none';

        const updatedTasks = node.tasks.map((t, idx) => {
            if (idx === taskIndex) return { ...t, completed: nextStatus === 'completed', status: nextStatus };
            return t;
        });

        nodesData.update({ id: nodeId, tasks: updatedTasks });
        calculateTreeStatus();
        saveToFirebase();
    };
